<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うらない</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f4f0c6;
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dialog1,
        #dialog2 {
            width: 100%;
            max-width: 320px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #fffbd5;
            box-shadow: 2px 2px 4px #fffbd5;
            border-radius: 8px;
            background-color: white;
        }

        #dialog1 p {
            font-size: 18px;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        #dialog1 button {
            display: inline-block;
            width: calc(50% - 6px);
            padding: 12px 8px;
            margin: 6px 3px;
            font-size: 14px;
            background-color: #fff9e6;
            border: 1px solid #fffbd5;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #dialog1 button:active {
            background-color: #f0e6b2;
        }

        #dialog2 {
            display: none;
        }

        #dialog2 p {
            font-size: 48px;
            margin: 0 0 20px 0;
            font-weight: bold;
        }

        #color {
            font-size: 16px;
            margin: 20px 0;
            padding: 12px 0;
            border-top: 1px solid #fffbd5;
            border-bottom: 1px solid #fffbd5;
        }

        #color-swatch {
            display: inline-block;
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-left: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        #item {
            font-size: 16px;
            margin: 20px 0;
            padding: 12px 0;
            border-bottom: 1px solid #fffbd5;
        }

        #again {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            background-color: #fff9e6;
            border: 1px solid #fffbd5;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #again:active {
            background-color: #f0e6b2;
        }

        /* iPhone SE / 小さい画面対応 */
        @media (max-height: 600px) {
            body {
                padding: 5px;
            }

            #dialog1,
            #dialog2 {
                padding: 20px 15px;
            }

            #dialog2 p {
                font-size: 40px;
                margin: 0 0 15px 0;
            }
        }
    </style>
</head>

<body>
    <div id="dialog1">
        <p>あなたの星座はなんですか？</p>
        <button>おひつじ座</button> <button>おうし座</button>
        <button>ふたご座</button> <button>かに座</button>
        <button>しし座</button> <button>おとめ座</button>
        <button>てんびん座</button> <button>さそり座</button>
        <button>いて座</button> <button>やぎ座</button>
        <button>みずがめ座</button> <button>うお座</button>
    </div>

    <div id="dialog2">
        <p id="result">-</p>
        <div id="color">ラッキーカラー: <span id="color-name">-</span><span id="color-swatch"></span></div>
        <div id="item">ラッキーアイテム: <span id="item-name">-</span></div>
        <button id="again">戻る</button>
    </div>

    <script>
        const dialog1 = document.getElementById("dialog1");
        const buttons = dialog1.getElementsByTagName("button");
        const dialog2 = document.getElementById("dialog2");
        const result = document.getElementById("result");
        const again = document.getElementById("again");
        const colorName = document.getElementById("color-name");
        const colorSwatch = document.getElementById("color-swatch");
        const itemName = document.getElementById("item-name");

        const fortunes = ["大吉", "中吉", "小吉", "吉", "末吉", "凶", "大凶"];

        const luckyColors = [
            { name: "薄紫", code: "#F1B6FF" },
            { name: "水色", code: "#9AFFFF" },
            { name: "黄緑", code: "#E7FF87" },
            { name: "薄黄色", code: "#FDFFBB" },
            { name: "濃ピンク", code: "#FF3B95" },
            { name: "オレンジ", code: "#FFAE93" },
            { name: "ピンク", code: "#FF86F4" },
        ];

        const luckyItems = [
            "ペン", "コイン", "ハンカチ", "キーホルダー", "キャンドル",
            "植物", "ノート", "アクセサリー", "お守り", "チョコレート"
        ];

        function randomFortune() {
            return fortunes[Math.floor(Math.random() * fortunes.length)];
        }

        function randomLuckyColor() {
            return luckyColors[Math.floor(Math.random() * luckyColors.length)];
        }

        function randomLuckyItem() {
            return luckyItems[Math.floor(Math.random() * luckyItems.length)];
        }

        for (let i = 0; i < buttons.length; i++) {
            buttons[i].addEventListener("click", () => {
                result.textContent = randomFortune();

                const color = randomLuckyColor();
                colorName.textContent = color.name;
                colorSwatch.style.backgroundColor = color.code;

                itemName.textContent = randomLuckyItem();

                dialog1.style.display = "none";
                dialog2.style.display = "block";
            });
        }

        again.addEventListener("click", () => {
            dialog2.style.display = "none";
            dialog1.style.display = "block";

            result.textContent = "-";
            colorName.textContent = "-";
            colorSwatch.style.backgroundColor = "transparent";
            itemName.textContent = "-";
        });
    </script>
</body>

</html>
